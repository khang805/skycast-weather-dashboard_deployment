name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:${{ github.sha }}

  update-manifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|image: .*/weather-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/weather-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|image: .*/weather-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/weather-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "Update K8s manifests with new image tag: ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
