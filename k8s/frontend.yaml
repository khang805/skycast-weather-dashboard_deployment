apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-frontend
  labels:
    app: weather-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-frontend
  template:
    metadata:
      labels:
        app: weather-frontend
    spec:
      containers:
        - name: frontend
          # This image name will be automatically updated by GitHub Actions
          image: abdurrahman1148/weather-frontend:f72408c3da2ee751ae9abbc75016384c1c968cc4
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: weather-frontend-svc
spec:
  type: NodePort
  selector:
    app: weather-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
