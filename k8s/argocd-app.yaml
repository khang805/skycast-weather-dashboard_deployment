apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skycast-weather-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/khang805/skycast-weather-dashboard_deployment.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
